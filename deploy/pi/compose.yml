name: garsone-pi

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-garsone}
      POSTGRES_USER: ${POSTGRES_USER:-garsone}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 12

  core:
    image: ${DOCKERHUB_NAMESPACE:?Set DOCKERHUB_NAMESPACE in .env}/garsone-core:${IMAGE_TAG:-pi}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8787
      LOG_LEVEL: ${LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      DB_CONNECTION: default
      DATABASE_URL: postgresql://${POSTGRES_USER:-garsone}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-garsone}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-garsone}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-garsone}?schema=public
      DB_BOOTSTRAP_MODE: ${DB_BOOTSTRAP_MODE:-push}
      DB_WAIT_TIMEOUT_SECONDS: ${DB_WAIT_TIMEOUT_SECONDS:-90}
      DB_SEED_ON_START: ${DB_SEED_ON_START:-false}
      LOCAL_UPLOAD_DIR: /app/uploads
      STORE_SLUG: ${STORE_SLUG:-default-store}
      ENABLE_DEV_LOGIN: ${ENABLE_DEV_LOGIN:-0}
      MQTT_DISABLED: ${MQTT_DISABLED:-true}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:8080}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:8080}
      FRONTEND_PORT: ${FRONTEND_PORT:-8080}
      PUBLIC_APP_BASE_URL: ${PUBLIC_APP_BASE_URL:-http://localhost:8080}
      PUBLIC_APP_PROTOCOL: ${PUBLIC_APP_PROTOCOL:-http}
      PUBLIC_APP_DOMAIN: ${PUBLIC_APP_DOMAIN:-localhost}
      PUBLIC_APP_PORT: ${PUBLIC_APP_PORT:-8080}
      OPS_APP_PATH: ${OPS_APP_PATH:-/ops}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:support@garsone.app}
      VIVA_API_KEY: ${VIVA_API_KEY:-}
      VIVA_SOURCE_CODE: ${VIVA_SOURCE_CODE:-Default}
      VIVA_CLIENT_ID: ${VIVA_CLIENT_ID:-}
      VIVA_CLIENT_SECRET: ${VIVA_CLIENT_SECRET:-}
      VIVA_MERCHANT_ID: ${VIVA_MERCHANT_ID:-}
    volumes:
      - core-uploads:/app/uploads
    ports:
      - "${CORE_PORT:-8787}:8787"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 30s

  front:
    image: ${DOCKERHUB_NAMESPACE:?Set DOCKERHUB_NAMESPACE in .env}/garsone-front:${IMAGE_TAG:-pi}
    restart: unless-stopped
    depends_on:
      core:
        condition: service_healthy
    ports:
      - "${FRONT_PORT:-8080}:80"

  seed:
    image: ${DOCKERHUB_NAMESPACE:?Set DOCKERHUB_NAMESPACE in .env}/garsone-core:${IMAGE_TAG:-pi}
    profiles: ["seed"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DB_CONNECTION: default
      DATABASE_URL: postgresql://${POSTGRES_USER:-garsone}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-garsone}?schema=public
      DIRECT_URL: postgresql://${POSTGRES_USER:-garsone}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-garsone}?schema=public
      DB_BOOTSTRAP_MODE: none
      SEED_RESET: ${SEED_RESET:-0}
      PUBLIC_APP_URL: ${PUBLIC_APP_BASE_URL:-http://localhost:8080}
    command: ["npm", "run", "db:seed"]

volumes:
  postgres-data:
  core-uploads:
